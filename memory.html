<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Memory Match | PlayFusion Hub</title>
    <style>
        body { background: #03030c; color: white; display: flex; flex-direction: column; align-items: center; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        h1 { color: #00f2fe; margin-bottom: 10px; }
        .stats { margin-bottom: 15px; font-size: 18px; color: #45f3ff; }
        .grid { display: grid; grid-template-columns: repeat(4, 80px); gap: 10px; margin-bottom: 20px; position: relative; }
        .card { width: 80px; height: 80px; background: #00f2fe; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; transition: transform 0.2s; }
        .card.flipped { background: #fff; transform: rotateY(180deg); }
        
        /* Win Overlay */
        #win-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
                   background: rgba(0, 0, 0, 0.9); padding: 20px; border: 2px solid #39ff14; 
                   color: #39ff14; display: none; font-size: 32px; font-weight: bold; z-index: 10; }
        
        .btn { background: #39ff14; color: #03030c; padding: 10px 25px; border-radius: 20px; border: none; cursor: pointer; font-weight: bold; }
        .return-link { margin-top: 15px; color: #8394a6; text-decoration: none; }
    </style>
</head>
<body>
    <h1>Memory Match</h1>
    <div class="stats" id="stats">Turns: 0</div>
    <div class="grid" id="grid">
        <div id="win-msg">YOU WON!</div>
    </div>
    <button class="btn" onclick="initGame()">Restart Game</button>
    <a href="index.html" class="return-link">← Return to Hub</a>

    <script>
        const emojis = ['🍎', '🍎', '🍌', '🍌', '🍇', '🍇', '🍓', '🍓', '🍒', '🍒', '🍍', '🍍'];
        let flippedCards = [], matchedPairs = 0, turns = 0;

        function initGame() {
            const grid = document.getElementById('grid');
            document.getElementById('win-msg').style.display = 'none';
            grid.innerHTML = '<div id="win-msg">YOU WON!</div>';
            matchedPairs = 0; turns = 0; flippedCards = [];
            document.getElementById('stats').innerText = "Turns: 0";
            
            emojis.sort(() => Math.random() - 0.5);
            emojis.forEach(emoji => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.emoji = emoji;
                card.onclick = flipCard;
                grid.appendChild(card);
            });
        }

        function flipCard() {
            if (flippedCards.length < 2 && !this.classList.contains('flipped')) {
                this.classList.add('flipped');
                this.innerText = this.dataset.emoji;
                flippedCards.push(this);

                if (flippedCards.length === 2) {
                    turns++;
                    document.getElementById('stats').innerText = "Turns: " + turns;
                    setTimeout(checkMatch, 500);
                }
            }
        }

        function checkMatch() {
            const [c1, c2] = flippedCards;
            if (c1.dataset.emoji === c2.dataset.emoji) {
                matchedPairs++;
                if (matchedPairs === emojis.length / 2) {
                    document.getElementById('win-msg').style.display = 'block';
                }
            } else {
                c1.classList.remove('flipped'); c1.innerText = '';
                c2.classList.remove('flipped'); c2.innerText = '';
            }
            flippedCards = [];
        }

        initGame();
    </script>
</body>
</html>
