<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Color Dodge | PlayFusion Hub</title>
    <style>
        body { background: #03030c; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; }
        
        /* Glowing Title */
        #game-title { font-size: 40px; color: #00f2fe; text-shadow: 0 0 15px #00f2fe; margin-bottom: 5px; }
        
        /* Small Score */
        #score-display { font-size: 18px; color: #8394a6; margin-bottom: 15px; }
        
        canvas { border: 4px solid #45f3ff; background: #050515; cursor: none; border-radius: 10px; }
        .btn { background: #39ff14; color: #03030c; padding: 15px 30px; border-radius: 25px; border: none; cursor: pointer; font-size: 18px; font-weight: bold; margin-top: 15px; }
        .link { margin-top: 15px; color: #8394a6; text-decoration: none; }
    </style>
</head>
<body>

    <div id="game-title">COLOR DODGE</div>
    <div id="score-display">Score: 0</div>
    
    <canvas id="c" width="400" height="400"></canvas>
    
    <button class="btn" onclick="resetGame()">Start New Game!</button>
    <a href="index.html" class="link">← Return to Hub</a>

    <script>
        const canvas = document.getElementById("c");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score-display");
        
        let playerX = 200, enemyY = -30, enemyX = 185, score = 0, gameRunning = false;

        function update() {
            if (!gameRunning) return;

            // Background & Entities
            ctx.fillStyle = "black"; ctx.fillRect(0, 0, 400, 400);
            ctx.fillStyle = "#45f3ff"; ctx.fillRect(playerX, 350, 40, 40);
            ctx.fillStyle = "#ff4444"; ctx.fillRect(enemyX, enemyY, 40, 40);

            // HARDER: Speed increases significantly as you play
           function update() {
            if (!gameRunning) return;

            // Background & Entities
            ctx.fillStyle = "black"; ctx.fillRect(0, 0, 400, 400);
            ctx.fillStyle = "#45f3ff"; ctx.fillRect(playerX, 350, 40, 40);
            ctx.fillStyle = "#ff4444"; ctx.fillRect(enemyX, enemyY, 40, 40);

            // UPDATED: Slower starting speed and gradual scaling
            enemyY += 4 + (score * 0.2); 

            // Obstacle Reset
            if (enemyY > 400) { 
                enemyY = -30; 
                enemyX = Math.random() * 360; 
                score++; 
                scoreEl.innerText = "Score: " + score;
            }

            // COLLISION: One hit ends it
            if (enemyY > 310 && enemyY < 390 && enemyX > playerX - 40 && enemyX < playerX + 40) {
                gameOver();
            } else {
                requestAnimationFrame(update);
            }
        }
            // Obstacle Reset
            if (enemyY > 400) { 
                enemyY = -30; 
                enemyX = Math.random() * 360; 
                score++; 
                scoreEl.innerText = "Score: " + score;
            }

            // COLLISION: One hit ends it
            if (enemyY > 310 && enemyY < 390 && enemyX > playerX - 40 && enemyX < playerX + 40) {
                gameOver();
            } else {
                requestAnimationFrame(update);
            }
        }

        function gameOver() {
            gameRunning = false;
            ctx.fillStyle = "rgba(0, 0, 0, 0.9)";
            ctx.fillRect(0, 0, 400, 400);
            ctx.fillStyle = "#ff4444";
            ctx.font = "bold 40px Arial";
            ctx.textAlign = "center";
            ctx.fillText("GAME OVER!", 200, 200);
            ctx.font = "20px Arial";
            ctx.fillStyle = "white";
            ctx.fillText("Final Score: " + score, 200, 240);
        }

        function resetGame() {
            score = 0; 
            scoreEl.innerText = "Score: 0";
            enemyY = -30; 
            gameRunning = true;
            update();
        }

        window.onmousemove = (e) => {
            const rect = canvas.getBoundingClientRect();
            playerX = e.clientX - rect.left - 20;
        };
    </script>
</body>
</html>
